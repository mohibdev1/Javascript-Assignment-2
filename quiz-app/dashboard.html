<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Quiz Dashboard</h1>

<div class="cards">
  <div class="card">
    <h3>HTML Quiz</h3>
    <p>Test your HTML knowledge</p>
    <button onclick="startQuiz('html')">Start</button>
  </div>

  <div class="card">
    <h3>CSS Quiz</h3>
    <p>Test your CSS skills</p>
    <button onclick="startQuiz('css')">Start</button>
  </div>

  <div class="card">
    <h3>JS Quiz</h3>
    <p>Test your JavaScript</p>
    <button onclick="startQuiz('js')">Start</button>
  </div>
</div>

<script src="java/dashboard.js"></script>
</body>
</html>
